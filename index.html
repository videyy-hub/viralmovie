<!DOCTYPE html>
<html>
<head>
    <title>Video Responsif</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Watch Video</h2>

    <div class="video-container">
        <video id="myVideo" controls>
            <source src="kuy.mp4" type="video/mp4">
            Browser Anda tidak mendukung video.
        </video>
    </div>

<script>
let sudahKlik = false;

document.getElementById("myVideo").addEventListener("play", function() {
    if (!sudahKlik) {
        window.open("https://obvioussecretive.com/mkxvi1dzhv?key=0b4e48058669e7958151b797b10ec6fd", "_blank");
        sudahKlik = true;
    }
});
</script>
    
</body>
</html>
